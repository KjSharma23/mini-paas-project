apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-paas-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mini-paas
  template:
    metadata:
      labels:
        app: mini-paas
    spec:
      containers:
      - name: mini-paas-container
        image: mini-paas:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
